<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>San — AI Creative Builder</title>
    <meta name="description" content="San：AI Creative Builder。用 AI 把创意变成作品、工具与可交付方案。" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=v1" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top"><span class="brand-mark">S</span>an</a>
      <nav class="site-nav">
        <a href="#works">作品</a>
        <a href="#directions">方向</a>
        <a href="#archive">记录</a>
        <a href="#about">关于</a>
      </nav>
    </header>

    <main id="top">
      <!-- Hero -->
      <section class="hero">
        <p class="eyebrow" id="heroEyebrow"></p>
        <h1 class="hero-name" id="heroName"></h1>
        <p class="hero-tagline" id="heroTagline"></p>
        <p class="hero-intro" id="heroIntro"></p>
        <div class="hero-stats" id="heroStats"></div>
      </section>

      <!-- Featured works -->
      <section class="section" id="works">
        <div class="section-head">
          <p class="eyebrow">Selected Works</p>
          <h2>精选作品</h2>
        </div>
        <div class="featured-list" id="featuredList"></div>
      </section>

      <!-- Directions -->
      <section class="section" id="directions">
        <div class="section-head">
          <p class="eyebrow">Directions</p>
          <h2>创作方向</h2>
        </div>
        <div class="direction-grid" id="directionGrid"></div>
      </section>

      <!-- Archive -->
      <section class="section" id="archive">
        <div class="section-head">
          <p class="eyebrow">Archive</p>
          <h2>全部记录</h2>
        </div>
        <ol class="archive-list" id="archiveList"></ol>
      </section>

      <!-- About / Contact -->
      <section class="section about" id="about">
        <div class="section-head">
          <p class="eyebrow">About</p>
          <h2>关于</h2>
        </div>
        <p class="about-text" id="aboutText"></p>
        <a class="contact-link" id="contactLink" href="#">联系我</a>
      </section>
    </main>

    <footer class="site-footer">
      <p id="footerLine"></p>
    </footer>

    <script src="./app.js?v=v1"></script>
  </body>
</html>
